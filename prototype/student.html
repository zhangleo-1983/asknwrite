<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AskNWrite Student Chat Prototype</title>
  <style>
    :root {
      --bg: #f5efe7;
      --surface: #faf7f2;
      --surface-soft: #fffdf9;
      --sidebar: #1f1b18;
      --sidebar-soft: #2a2521;
      --ink: #1c1916;
      --muted: #70665c;
      --muted-strong: #b7ada4;
      --line: rgba(42, 31, 24, 0.12);
      --line-dark: rgba(255, 245, 235, 0.08);
      --accent: #df6330;
      --accent-soft: rgba(223, 99, 48, 0.12);
      --sage: #73846a;
      --shadow: 0 20px 60px rgba(68, 42, 23, 0.12);
      --bubble-shadow: 0 12px 26px rgba(53, 38, 28, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 0% 0%, rgba(223, 99, 48, 0.12), transparent 30%),
        radial-gradient(circle at 100% 0%, rgba(115, 132, 106, 0.12), transparent 28%),
        linear-gradient(180deg, #fbf8f3 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      padding: 16px;
    }

    .app {
      min-height: calc(100vh - 32px);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(46, 34, 24, 0.08);
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 340px;
      background: rgba(255, 252, 247, 0.75);
      backdrop-filter: blur(18px);
    }

    .sidebar {
      background:
        linear-gradient(180deg, rgba(26, 23, 20, 0.98), rgba(38, 33, 29, 0.96));
      color: white;
      border-right: 1px solid var(--line-dark);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-height: 0;
    }

    .sidebar-header,
    .sidebar-section,
    .sidebar-footer {
      padding: 20px 18px;
    }

    .sidebar-header {
      border-bottom: 1px solid var(--line-dark);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), #f29b63);
      font-weight: 700;
      letter-spacing: 0.08em;
      box-shadow: 0 12px 26px rgba(223, 99, 48, 0.25);
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted-strong);
    }

    .brand-row h1 {
      margin: 0;
      font-family: "Iowan Old Style", "Noto Serif SC", Georgia, serif;
      font-size: 24px;
      line-height: 1;
    }

    .sidebar-header p,
    .sidebar-section p,
    .sidebar-footer p {
      margin: 0;
      color: var(--muted-strong);
      line-height: 1.6;
      font-size: 13px;
    }

    .new-session {
      width: 100%;
      border: 0;
      cursor: pointer;
      border-radius: 16px;
      padding: 14px 16px;
      text-align: left;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      transition: background 180ms ease, transform 180ms ease;
    }

    .new-session:hover,
    .history-item:hover,
    .send-button:hover,
    .quick-pill:hover {
      transform: translateY(-1px);
    }

    .new-session strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .history-list {
      padding: 0 12px 18px;
      overflow: auto;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .history-item {
      width: 100%;
      border: 0;
      cursor: pointer;
      padding: 14px 12px;
      border-radius: 16px;
      text-align: left;
      background: transparent;
      color: white;
      transition: background 180ms ease, transform 180ms ease;
    }

    .history-item.active {
      background: rgba(255, 255, 255, 0.1);
    }

    .history-item .title {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item .meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: var(--muted-strong);
    }

    .history-item .stage {
      color: #f2d0bc;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.65), rgba(249, 245, 238, 0.85)),
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 35px,
          rgba(120, 102, 84, 0.045) 35px,
          rgba(120, 102, 84, 0.045) 36px
        );
    }

    .main-header {
      padding: 18px 24px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 252, 247, 0.78);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .main-header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .main-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .header-pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(28, 25, 22, 0.05);
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .pill.accent {
      background: var(--accent-soft);
      color: #964520;
    }

    .conversation {
      overflow: auto;
      padding: 22px 24px 28px;
      display: grid;
      gap: 16px;
      align-content: start;
      min-width: 0;
    }

    .message {
      max-width: 820px;
      padding: 18px 18px 16px;
      border-radius: 22px;
      box-shadow: var(--bubble-shadow);
      animation: rise 220ms ease;
    }

    .message.agent {
      background: rgba(255, 253, 249, 0.96);
      border-top-left-radius: 8px;
    }

    .message.student {
      margin-left: auto;
      max-width: 700px;
      background: linear-gradient(135deg, rgba(223, 99, 48, 0.96), rgba(242, 155, 99, 0.95));
      color: white;
      border-top-right-radius: 8px;
    }

    .message header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .message.student header {
      color: rgba(255, 255, 255, 0.8);
      justify-content: flex-end;
    }

    .message p {
      margin: 0;
      line-height: 1.7;
      font-size: 15px;
      word-break: break-word;
    }

    .message ul {
      margin: 12px 0 0;
      padding-left: 18px;
    }

    .message li {
      margin: 6px 0;
      line-height: 1.55;
    }

    .composer {
      border-top: 1px solid var(--line);
      background: rgba(255, 251, 245, 0.9);
      padding: 16px 24px 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 130px;
      gap: 12px;
      align-items: end;
    }

    textarea,
    button {
      font: inherit;
    }

    .reply-box {
      display: grid;
      gap: 10px;
    }

    .reply-input {
      width: 100%;
      min-height: 98px;
      resize: vertical;
      border: 1px solid rgba(58, 42, 31, 0.12);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.86);
      padding: 16px;
      outline: none;
      color: var(--ink);
      line-height: 1.65;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .reply-input:focus,
    .draft-input:focus {
      border-color: rgba(223, 99, 48, 0.4);
      box-shadow: 0 0 0 4px rgba(223, 99, 48, 0.08);
    }

    .quick-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-pill {
      border: 0;
      cursor: pointer;
      padding: 9px 11px;
      border-radius: 999px;
      background: rgba(30, 24, 20, 0.05);
      color: var(--ink);
      font-size: 13px;
      transition: transform 180ms ease, background 180ms ease;
    }

    .send-button {
      border: 0;
      cursor: pointer;
      padding: 16px 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), #f29b63);
      color: white;
      font-weight: 700;
      box-shadow: 0 14px 28px rgba(223, 99, 48, 0.2);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .aside {
      border-left: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 251, 246, 0.96), rgba(247, 242, 235, 0.95));
      padding: 18px 18px 20px;
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(220px, 44%);
      gap: 14px;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(40, 29, 21, 0.07);
      box-shadow: 0 10px 24px rgba(62, 43, 26, 0.06);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .panel-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(51, 37, 28, 0.08);
    }

    .panel-header h3 {
      margin: 0;
      font-size: 16px;
    }

    .panel-header p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .panel-body {
      overflow: auto;
      padding: 14px 16px 16px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .summary-card {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 252, 248, 0.88);
      border: 1px solid rgba(46, 34, 25, 0.06);
    }

    .summary-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .summary-card p,
    .summary-card li {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .summary-card ul,
    .summary-card ol {
      margin: 0;
      padding-left: 18px;
    }

    .summary-card li + li {
      margin-top: 6px;
    }

    .draft-input {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(58, 42, 31, 0.1);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      padding: 14px;
      resize: none;
      outline: none;
      color: var(--ink);
      line-height: 1.65;
    }

    .draft-tip {
      font-size: 12px;
      color: var(--muted);
    }

    a.inline-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1180px) {
      .app {
        grid-template-columns: 240px minmax(0, 1fr) 300px;
      }
    }

    @media (max-width: 980px) {
      body {
        padding: 0;
      }

      .app {
        min-height: 100vh;
        border-radius: 0;
        border: 0;
        grid-template-columns: 1fr;
        grid-template-rows: 220px minmax(0, 1fr) 320px;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line-dark);
      }

      .sidebar {
        grid-template-rows: auto auto 1fr;
      }

      .aside {
        border-left: 0;
        border-top: 1px solid var(--line);
        grid-template-columns: 1fr 1fr;
        grid-template-rows: none;
      }
    }

    @media (max-width: 720px) {
      .main-header,
      .conversation,
      .composer {
        padding-left: 16px;
        padding-right: 16px;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .aside {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) 260px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand-row">
          <div class="brand-mark">AW</div>
          <div>
            <p class="eyebrow">Student Chat</p>
            <h1>AskNWrite</h1>
          </div>
        </div>
        <p>像 ChatGPT 一样对话，但目标不是代写，而是帮你一步步学会独立写作文。</p>
      </div>

      <div class="sidebar-section">
        <button id="newSessionButton" class="new-session">
          <strong>+ 新的一次训练</strong>
          <span>先输入作文题目，再开始整轮对话。</span>
        </button>
      </div>

      <div id="historyList" class="history-list"></div>

      <div class="sidebar-footer">
        <p>学生端只保留聊天、阶段要点和草稿区。观察端仍在 <a class="inline-link" href="./index.html">观察端页面</a>。</p>
      </div>
    </aside>

    <main class="main">
      <header class="main-header">
        <div>
          <h2 id="chatTitle">新的训练</h2>
          <p id="chatSubtitle">先把作文题目发给我，我会用提问把你带进写作状态。</p>
        </div>
        <div class="header-pills">
          <span id="stagePill" class="pill accent">等待题目</span>
          <span id="guidancePill" class="pill">半放手</span>
        </div>
      </header>

      <section id="conversation" class="conversation"></section>

      <footer class="composer">
        <div class="reply-box">
          <textarea id="replyInput" class="reply-input" placeholder="如果这是新训练，先输入作文题目。例如：那一次，我真感动"></textarea>
          <div class="quick-row">
            <button class="quick-pill" data-text="我只想到一点点，不知道怎么写。">我卡住了</button>
            <button class="quick-pill" data-text="我想写运动会那天摔倒后，同学扶我起来。">给一个方向</button>
            <button class="quick-pill" data-text="直接帮我写一篇吧。">试探代写</button>
          </div>
        </div>
        <button id="sendButton" class="send-button">发送</button>
      </footer>
    </main>

    <aside class="aside">
      <section class="panel">
        <div class="panel-header">
          <h3>阶段性要点</h3>
          <p>这里自动汇总这次对话里已经想清楚的内容，帮助你随时回看，不打断聊天。</p>
        </div>
        <div id="summaryPanel" class="panel-body"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h3>草稿区</h3>
          <p>把你觉得有用的句子、提纲或片段先记在这里。它不会直接发到聊天里。</p>
        </div>
        <div class="panel-body">
          <textarea id="draftInput" class="draft-input" placeholder="例如：
开头：运动会那天下雨了，我摔倒时特别狼狈。
关键细节：同学跑过来扶我，还拍了拍我的肩。"></textarea>
          <div class="draft-tip">这块是学生自己的临时草稿，不是最终作文。</div>
        </div>
      </section>
    </aside>
  </div>

  <script>
    const STAGES = [
      { key: "topic", label: "审题", pill: "审题中", note: "先说清楚题目里最关键的一件事。" },
      { key: "idea", label: "立意", pill: "立意中", note: "把想表达的意思压成一句中心句。" },
      { key: "material", label: "选材", pill: "选材中", note: "只留最能支撑主题的片段。" },
      { key: "structure", label: "结构", pill: "整理提纲", note: "开始把零散回答整理成结构。" },
      { key: "draft", label: "起草", pill: "起草中", note: "先写关键段，不追求一次完整。" },
      { key: "feedback", label: "反馈", pill: "修改中", note: "优先修改切题和具体。" },
      { key: "review", label: "复盘", pill: "已完成", note: "记住方法，下次会更独立。" }
    ];

    const DOM = {
      historyList: document.getElementById("historyList"),
      newSessionButton: document.getElementById("newSessionButton"),
      chatTitle: document.getElementById("chatTitle"),
      chatSubtitle: document.getElementById("chatSubtitle"),
      stagePill: document.getElementById("stagePill"),
      guidancePill: document.getElementById("guidancePill"),
      conversation: document.getElementById("conversation"),
      replyInput: document.getElementById("replyInput"),
      sendButton: document.getElementById("sendButton"),
      summaryPanel: document.getElementById("summaryPanel"),
      draftInput: document.getElementById("draftInput"),
      quickPills: Array.from(document.querySelectorAll(".quick-pill"))
    };

    let sessionCounter = 3;

    const sessions = [
      {
        id: "s1",
        title: "我的老师",
        age: 11,
        level: "beginner",
        stageIndex: 6,
        date: "今天",
        dependencyScore: 0.74,
        started: true,
        summary: {
          stageNote: "通过一件改作业的小事写老师认真负责。",
          center: "老师的严格里藏着关心。",
          materials: ["改错本", "放学后的谈话", "老师圈出重点句"],
          outline: ["开头交代老师总是很严格。", "中间写一次被叫去办公室改作文。", "结尾写我后来理解了老师。"],
          feedback: ["少写“老师很好”，多写她怎么做。"],
          nextTask: "下次先自己列提纲，再来检查是否跑题。"
        },
        draft: "老师把我的作文本翻到最后一页，说：这句话你再想一想。",
        messages: [
          {
            role: "agent",
            title: "AskNWrite",
            text: "我们先别急着写全文。你准备写老师的哪一件事？",
            bullets: ["先说一件最能代表老师特点的小事。"]
          },
          {
            role: "student",
            text: "我想写有一次老师放学后把我留下来改作文。"
          },
          {
            role: "agent",
            title: "AskNWrite",
            text: "这个方向是对的。那次事情里，最能说明老师特点的动作或一句话是什么？"
          }
        ]
      },
      {
        id: "s2",
        title: "我读懂了坚持",
        age: 15,
        level: "proficient",
        stageIndex: 4,
        date: "昨天",
        dependencyScore: 0.34,
        started: true,
        summary: {
          stageNote: "主题已经确定为“坚持不是硬撑，而是一次次不放弃”。",
          center: "我在长跑训练里读懂了坚持的真实含义。",
          materials: ["第一次跑不完全程", "第二周脚酸还继续训练", "比赛当天最后一圈"],
          outline: ["开头写一开始抗拒长跑。", "中间写训练的挫败和变化。", "结尾写最后一圈时真正懂了坚持。"],
          feedback: ["转折段可以再写具体一点。"],
          nextTask: "把最后一圈的动作、呼吸和心理活动写出来。"
        },
        draft: "最后一圈时，我听见自己的呼吸像风箱一样响，却还是没有停下来。",
        messages: [
          {
            role: "agent",
            title: "AskNWrite",
            text: "你准备通过哪个片段来承载“坚持”这个主题？"
          },
          {
            role: "student",
            text: "我想写长跑训练，一开始我总想放弃。"
          }
        ]
      }
    ];

    let currentSessionId = null;

    function guidanceLabel(score) {
      if (score >= 0.7) return "强引导";
      if (score >= 0.45) return "半放手";
      return "弱引导";
    }

    function inferGenre(title) {
      if (title.includes("那一次") || title.includes("难忘")) return "记事";
      if (title.includes("老师") || title.includes("妈妈") || title.includes("同学")) return "写人";
      if (title.includes("春天") || title.includes("校园")) return "写景";
      if (title.includes("如果") || title.includes("假如")) return "想象";
      return "命题作文";
    }

    function makeEmptySession() {
      sessionCounter += 1;
      return {
        id: `s${sessionCounter}`,
        title: "新的训练",
        age: 13,
        level: "developing",
        stageIndex: -1,
        date: "刚刚",
        dependencyScore: 0.58,
        started: false,
        summary: {
          stageNote: "还没开始。先把作文题目发出来。",
          center: "",
          materials: [],
          outline: [],
          feedback: [],
          nextTask: "先输入作文题目。"
        },
        draft: "",
        messages: [
          {
            role: "agent",
            title: "AskNWrite",
            text: "把作文题目发给我，我们就开始。接下来会像正常聊天一样进行，我不会直接给整篇范文，但会帮你把思路一点点想出来。",
            bullets: [
              "第一条消息就写作文题目。",
              "卡住时可以直接说“我只想到一点点”。",
              "右侧会自动帮你记住阶段性要点。"
            ]
          }
        ]
      };
    }

    function currentSession() {
      return sessions.find(session => session.id === currentSessionId);
    }

    function stageFor(session) {
      return session.stageIndex < 0 ? null : STAGES[session.stageIndex];
    }

    function topicQuestions(session) {
      if (session.age <= 12) {
        return [
          "题目里最重要的人、事或景物是谁？",
          "最关键的瞬间发生在什么时候？"
        ];
      }
      return [
        "这道题最想让你表达的核心主题是什么？",
        "你准备通过哪一个片段来承载它？"
      ];
    }

    function ideaQuestions(session) {
      if (session.age <= 12) {
        return [
          "把你想表达的意思先缩成一句简单的话。",
          "你最想让老师记住哪种感受？"
        ];
      }
      return [
        "把中心句压缩成一句完整判断。",
        "你的情感或认识变化是什么？"
      ];
    }

    function materialQuestions(session) {
      if (session.age <= 12) {
        return [
          "把事情按开始、变化、结果说三步。",
          "最关键的画面里你看到了什么？"
        ];
      }
      return [
        "列出 2 到 3 个最能支撑中心的片段。",
        "哪个片段最适合展开细节？"
      ];
    }

    function structureHint(session) {
      return session.age <= 12
        ? "我先把你前面的想法整理成一个简单提纲。"
        : "我先把你前面的回答收成一个更清楚的结构。";
    }

    function draftPrompt(session) {
      return session.age <= 12
        ? "现在先写两三句，交代背景后立刻进入关键动作。"
        : "现在只写最关键的一段，尽量让细节代替空泛表态。";
    }

    function feedbackQuestions() {
      return [
        "回头看一遍，哪一句最像空话？",
        "哪一段和题目联系最弱？"
      ];
    }

    function reviewQuestions() {
      return [
        "这次你学会的一个方法是什么？",
        "下次你准备先自己试哪一步？"
      ];
    }

    function buildOutline(session) {
      const studentTexts = session.messages
        .filter(message => message.role === "student")
        .map(message => message.text);
      const first = studentTexts[0] || "交代题目场景";
      const second = studentTexts[1] || "展开关键片段";
      session.summary.outline = [
        `开头：点出题目“${session.title}”，带出场景。`,
        `中间：重点写“${first.slice(0, 24)}”。`,
        `补充：加入“${second.slice(0, 24)}”，让情节更完整。`,
        "结尾：回到题目，再说出你的感受。"
      ];
    }

    function buildFeedback(session, text) {
      const tips = [];
      if (text.length < 24) {
        tips.push("这段有点短，再补一个动作、一个画面或一句心里话。");
      }
      if (["我很感动", "非常有意义", "我学到了很多", "这让我难忘"].some(key => text.includes(key))) {
        tips.push("这里有点像空话，试着换成具体细节。");
      }
      const titleChars = session.title.split("").filter(char => char.trim()).slice(0, 4);
      if (!titleChars.some(char => text.includes(char))) {
        tips.push("这段和题目联系还不够紧，可以把题目关键词写回句子里。");
      }
      session.summary.feedback = tips.length ? tips : ["这一段已经比较切题，下一步重点是让段落连接更自然。"];
    }

    function renderHistory() {
      DOM.historyList.innerHTML = sessions
        .map(session => {
          const stage = stageFor(session);
          return `
            <button class="history-item ${session.id === currentSessionId ? "active" : ""}" data-id="${session.id}">
              <span class="title">${session.title}</span>
              <span class="meta">
                <span>${session.date}</span>
                <span class="stage">${stage ? stage.label : "未开始"}</span>
              </span>
            </button>
          `;
        })
        .join("");

      DOM.historyList.querySelectorAll(".history-item").forEach(button => {
        button.addEventListener("click", () => {
          currentSessionId = button.dataset.id;
          renderAll();
        });
      });
    }

    function renderHeader(session) {
      const stage = stageFor(session);
      DOM.chatTitle.textContent = session.title;
      DOM.chatSubtitle.textContent = session.started
        ? stage.note
        : "先把作文题目发给我，后面的训练会自动展开。";
      DOM.stagePill.textContent = stage ? stage.pill : "等待题目";
      DOM.guidancePill.textContent = guidanceLabel(session.dependencyScore);
    }

    function renderConversation(session) {
      DOM.conversation.innerHTML = "";
      session.messages.forEach(message => {
        const article = document.createElement("article");
        article.className = `message ${message.role}`;
        const bullets = message.bullets && message.bullets.length
          ? `<ul>${message.bullets.map(item => `<li>${item}</li>`).join("")}</ul>`
          : "";
        article.innerHTML = `
          <header>${message.role === "agent" ? message.title : "Student"}</header>
          <p>${message.text}</p>
          ${bullets}
        `;
        DOM.conversation.appendChild(article);
      });
      DOM.conversation.scrollTop = DOM.conversation.scrollHeight;
    }

    function summaryCard(title, body) {
      return `
        <section class="summary-card">
          <strong>${title}</strong>
          ${body}
        </section>
      `;
    }

    function renderSummary(session) {
      const stage = stageFor(session);
      const stageNote = session.summary.stageNote || "还没开始。";
      const center = session.summary.center || "等你先把题目和方向说出来。";
      const materials = session.summary.materials.length
        ? `<ul>${session.summary.materials.map(item => `<li>${item}</li>`).join("")}</ul>`
        : "<p>还没有收集到材料。</p>";
      const outline = session.summary.outline.length
        ? `<ol>${session.summary.outline.map(item => `<li>${item}</li>`).join("")}</ol>`
        : "<p>提纲会在聊到结构阶段后自动出现。</p>";
      const feedback = session.summary.feedback.length
        ? `<ul>${session.summary.feedback.map(item => `<li>${item}</li>`).join("")}</ul>`
        : "<p>开始起草后，这里会出现修改建议。</p>";
      DOM.summaryPanel.innerHTML = [
        summaryCard("当前阶段", `<p>${stage ? stage.label : "等待题目"} · ${stageNote}</p>`),
        summaryCard("中心想法", `<p>${center}</p>`),
        summaryCard("已选材料", materials),
        summaryCard("思路提纲", outline),
        summaryCard("下一步提醒", `<p>${session.summary.nextTask || "继续回答当前问题。"}</p>`),
        summaryCard("即时反馈", feedback)
      ].join("");
    }

    function renderDraft(session) {
      DOM.draftInput.value = session.draft || "";
    }

    function renderInputPlaceholder(session) {
      DOM.replyInput.placeholder = session.started
        ? "继续像聊天一样回答我。你可以说想法、片段、句子，或者直接说你卡住了。"
        : "如果这是新训练，先输入作文题目。例如：那一次，我真感动";
    }

    function renderAll() {
      const session = currentSession();
      renderHistory();
      renderHeader(session);
      renderConversation(session);
      renderSummary(session);
      renderDraft(session);
      renderInputPlaceholder(session);
    }

    function appendAgentMessage(session, text, bullets = []) {
      session.messages.push({
        role: "agent",
        title: "AskNWrite",
        text,
        bullets
      });
    }

    function updateSummaryFromReply(session, text) {
      if (session.stageIndex === 0) {
        session.summary.stageNote = `这是一道偏“${inferGenre(session.title)}”的题目，已经确定了基本方向。`;
        session.summary.center = text.length > 18 ? text : `${text}，需要继续往下收紧。`;
        session.summary.nextTask = "把你真正想表达的话压成一句中心句。";
      } else if (session.stageIndex === 1) {
        session.summary.center = text;
        session.summary.stageNote = "中心句已经开始清楚了。";
        session.summary.nextTask = "挑出 1 到 3 个最能支撑中心的片段。";
      } else if (session.stageIndex === 2) {
        session.summary.materials = session.summary.materials.concat(text).slice(-3);
        session.summary.stageNote = "已经开始收集可用材料。";
        buildOutline(session);
        session.summary.nextTask = "看看提纲是否顺，再准备写关键段。";
      } else if (session.stageIndex === 3) {
        buildOutline(session);
        session.summary.stageNote = "提纲已经整理出来了。";
        session.summary.nextTask = "先写最关键的一段，不求完整。";
      } else if (session.stageIndex === 4) {
        buildFeedback(session, text);
        session.summary.stageNote = "已经进入起草，开始针对片段修改。";
        session.summary.nextTask = "优先修改最像空话的那一句。";
      } else if (session.stageIndex === 5) {
        buildFeedback(session, text);
        session.summary.stageNote = "这一轮已经接近完成。";
        session.summary.nextTask = "复盘这次学会的方法，下次先自己试一次。";
      }
    }

    function blockGhostwrite(session) {
      if (!session.summary.outline.length) {
        buildOutline(session);
      }
      session.summary.stageNote = "已切回训练模式，不提供整篇代写。";
      session.summary.nextTask = "先自己写 2 到 3 句，我再帮你改得更具体、更切题。";
      appendAgentMessage(
        session,
        "我不会直接替你交作业，但我可以马上把你的思路收成一个提纲。你先写其中一段，我们再一起改。",
        session.summary.outline
      );
    }

    function nextTurn(session, text) {
      if (text.includes("直接帮我写") || text.includes("给我范文")) {
        blockGhostwrite(session);
        return;
      }

      updateSummaryFromReply(session, text);

      if (session.stageIndex < STAGES.length - 1) {
        session.stageIndex += 1;
      }

      const stage = stageFor(session);
      if (stage.key === "idea") {
        appendAgentMessage(
          session,
          "好，我们先别急着展开。先把你真正想表达的话压成一句清楚的中心句。",
          ideaQuestions(session)
        );
      } else if (stage.key === "material") {
        appendAgentMessage(
          session,
          "中心开始有了。接下来只挑最有用的材料，不要把所有事情都写进去。",
          materialQuestions(session)
        );
      } else if (stage.key === "structure") {
        appendAgentMessage(
          session,
          structureHint(session),
          session.summary.outline
        );
      } else if (stage.key === "draft") {
        appendAgentMessage(
          session,
          "思路已经比较清楚了。现在只写最关键的一段，像聊天一样把真实细节说出来就行。",
          [draftPrompt(session)]
        );
      } else if (stage.key === "feedback") {
        appendAgentMessage(
          session,
          "你已经开始动笔了。现在我们只改最关键的问题，不追求一次改完。",
          feedbackQuestions()
        );
      } else if (stage.key === "review") {
        session.dependencyScore = Math.max(0.22, session.dependencyScore - 0.12);
        appendAgentMessage(
          session,
          "这一轮已经完成。最后只复盘方法，看看你下次能不能更独立一点。",
          reviewQuestions()
        );
      }
    }

    function startSessionWithTitle(session, title) {
      session.started = true;
      session.title = title;
      session.stageIndex = 0;
      session.summary.stageNote = `这是一道偏“${inferGenre(title)}”的题目，先别急着写全文。`;
      session.summary.center = "";
      session.summary.materials = [];
      session.summary.outline = [];
      session.summary.feedback = [];
      session.summary.nextTask = "先说清楚你准备写什么。";
      session.messages.push({
        role: "student",
        text: title
      });
      appendAgentMessage(
        session,
        `这是一道偏“${inferGenre(title)}”的题目。今天我不会直接给你整篇范文，我会一步一步问你，让你自己把思路想出来。`,
        topicQuestions(session)
      );
    }

    function createNewSession() {
      const fresh = makeEmptySession();
      sessions.unshift(fresh);
      currentSessionId = fresh.id;
      renderAll();
    }

    function submitReply() {
      const text = DOM.replyInput.value.trim();
      if (!text) return;

      const session = currentSession();
      DOM.replyInput.value = "";

      if (!session.started) {
        startSessionWithTitle(session, text);
      } else {
        session.messages.push({
          role: "student",
          text
        });
        nextTurn(session, text);
      }

      session.date = "刚刚";
      renderAll();
    }

    DOM.newSessionButton.addEventListener("click", createNewSession);
    DOM.sendButton.addEventListener("click", submitReply);
    DOM.replyInput.addEventListener("keydown", event => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        submitReply();
      }
    });
    DOM.quickPills.forEach(button => {
      button.addEventListener("click", () => {
        DOM.replyInput.value = button.dataset.text;
        DOM.replyInput.focus();
      });
    });
    DOM.draftInput.addEventListener("input", event => {
      const session = currentSession();
      session.draft = event.target.value;
    });

    createNewSession();
  </script>
</body>
</html>
